<h2 mat-dialog-title class="bg-layer-3 text-default m-0">Thème</h2>
<mat-dialog-content class="bg-layer-3 text-default">
  <p>La personnalisation du thème sera disponible ultérieurement.</p>
  <mat-radio-group value="current" aria-label="Choix du thème">
    <mat-radio-button value="current">Thème actuel</mat-radio-button>
  </mat-radio-group>
</mat-dialog-content>
<mat-dialog-actions align="end" class="bg-layer-3">
  <button mat-flat-button type="button" (click)="close()">Fermer</button>
</mat-dialog-actions>
