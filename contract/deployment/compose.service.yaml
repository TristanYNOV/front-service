services:
  front:
    image: ghcr.io/<owner_lower>/front-service:prod
    container_name: front
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      AUTH_API_PREFIX: "http://auth:3000"
      API_ALLOWED_PREFIXES: "/auth,/api,/me,/users"
    healthcheck:
      test: ["CMD", "node", "-e", "const http=require('node:http');const req=http.get({host:'127.0.0.1',port:process.env.PORT||4000,path:'/healthz',timeout:2000},res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
