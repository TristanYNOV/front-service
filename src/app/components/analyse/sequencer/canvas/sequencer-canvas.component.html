<div
  class="bg-layer-1 border-layer relative h-full min-h-0 overflow-auto rounded-md border"
  data-pan-surface="true"
  (mousedown)="onViewportMouseDown($event)"
>
  <div class="relative" data-pan-surface="true" [ngStyle]="contentStyle()">
    @for (btn of btnList; track btn.id) {
      <button
        type="button"
        class="bg-surface border-layer absolute flex select-none flex-col items-start justify-between gap-1 overflow-hidden rounded-md border p-2 text-left"
        [ngStyle]="btnStyle(btn)"
        [class.is-active]="isActive(btn.id)"
        [class.is-pressed]="lastTriggeredBtnId === btn.id"
        (mousedown)="onBtnMouseDown($event, btn)"
        (click)="onBtnClick($event, btn)"
      >
        <div class="flex w-full items-start justify-between gap-2">
          <div class="min-w-0">
            <div class="truncate text-xs font-semibold">{{ btn.name }}</div>
            <div class="text-muted text-[10px] uppercase">{{ btn.type }}</div>
          </div>
          @if (editMode) {
            <div class="flex items-center gap-1">
              <button mat-icon-button type="button" (click)="onEditIconClick($event, btn)">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button type="button" (click)="onDeleteIconClick($event, btn)">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          }
        </div>

        <div class="text-muted w-full text-[10px]">{{ formatHotkey(btn.hotkeyNormalized) }}</div>
        <div class="accent-text w-full text-right text-[10px] font-semibold">×{{ triggerCount(btn.id) }}</div>

        @if (editMode) {
          <span
            class="border-layer bg-layer-0 absolute bottom-0 right-0 h-3.5 w-3.5 cursor-se-resize rounded-tl border-l border-t"
            (mousedown)="onResizeHandleMouseDown($event, btn)"
          ></span>
        }
      </button>
    }
  </div>
</div>
