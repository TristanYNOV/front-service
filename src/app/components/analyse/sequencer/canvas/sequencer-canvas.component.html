<div
  class="bg-layer-1 bg-canvas-grid hide-scrollbar border-layer relative h-full min-h-0 overflow-auto rounded-md border"
  data-pan-surface="true"
  (mousedown)="onViewportMouseDown($event)"
>
  <div class="relative" data-pan-surface="true" [ngStyle]="contentStyle()">
    @for (btn of btnList; track btn.id) {
      <div
        role="button"
        tabindex="0"
        class="bg-surface border-layer absolute flex select-none flex-col items-center justify-center gap-1 overflow-hidden rounded-md border p-2 text-center"
        [ngStyle]="btnStyle(btn)"
        [class.is-active]="isActive(btn.id)"
        [class.is-pressed]="lastTriggeredBtnId === btn.id"
        (mousedown)="onBtnMouseDown($event, btn)"
        (click)="onBtnClick($event, btn)"
      >
        @if (editMode) {
          <div class="absolute right-1 top-1 z-20 flex items-center gap-1">
            <button
              mat-icon-button
              type="button"
              class="border-layer bg-layer-0 flex h-5 w-5 min-h-5 min-w-5 items-center justify-center rounded border"
              (click)="onEditIconClick($event, btn)"
            >
              <mat-icon class="h-3.5 w-3.5 text-[14px]">edit</mat-icon>
            </button>
            <button
              mat-icon-button
              type="button"
              class="border-layer bg-layer-0 flex h-5 w-5 min-h-5 min-w-5 items-center justify-center rounded border"
              (click)="onDeleteIconClick($event, btn)"
            >
              <mat-icon class="h-3.5 w-3.5 text-[14px]">delete</mat-icon>
            </button>
          </div>
        }

        <div class="min-w-0 max-w-full px-1">
            <div class="truncate text-xs font-semibold">{{ btn.name }}</div>
            <div class="text-muted text-[10px] uppercase">{{ btn.type }}</div>
        </div>

        <div class="text-muted w-full text-[10px]">{{ formatHotkey(btn.hotkeyNormalized) }}</div>
        <div class="accent-text w-full text-[10px] font-semibold">×{{ triggerCount(btn.id) }}</div>

        @if (editMode) {
          <span
            class="border-layer bg-layer-0 absolute bottom-0 right-0 h-3.5 w-3.5 cursor-se-resize rounded-tl border-l border-t"
            (mousedown)="onResizeHandleMouseDown($event, btn)"
          ></span>
        }
      </div>
    }
  </div>
</div>
