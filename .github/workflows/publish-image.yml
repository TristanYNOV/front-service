name: Publish image

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate stable SemVer tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag invalide: ${GITHUB_REF_NAME}. Seuls les tags stables SemVer (vX.Y.Z) sont autorisés."
            exit 1
          fi
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Ensure tagged commit is on origin/prod
        run: |
          git fetch origin prod
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/prod"; then
            echo "Le commit taggé (${GITHUB_SHA}) n'appartient pas à l'historique de origin/prod."
            exit 1
          fi

      - name: Resolve image coordinates
        id: image
        run: |
          OWNER_LOWER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE_NAME="ghcr.io/${OWNER_LOWER}/front-service"
          echo "owner_lower=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"
          echo "name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=raw,value=prod
            type=raw,value=${{ env.VERSION }}
          labels: |
            org.opencontainers.image.title=front-service
            org.opencontainers.image.description=Frontend Angular SSR runtime image

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Publish workflow summary
        run: |
          {
            echo "## GHCR publication"
            echo
            echo "- Image: \`${{ steps.image.outputs.name }}\`"
            echo "- Tag latest: \`${{ steps.image.outputs.name }}:latest\`"
            echo "- Tag prod: \`${{ steps.image.outputs.name }}:prod\`"
            echo "- Tag version: \`${{ steps.image.outputs.name }}:${{ env.VERSION }}\`"
            echo "- Digest final: \`${{ steps.build.outputs.digest }}\`"
            echo
            echo "> Infra: privilégier un déploiement verrouillé sur le digest GHCR."
          } >> "$GITHUB_STEP_SUMMARY"
